services:
  - type: web
    name: mulak-proptech
    env: node
    buildCommand: cd backend && npm install
    startCommand: cd backend && node src/server.js
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 3000
      - key: HOST
        value: 0.0.0.0
      - key: JWT_SECRET
        generateValue: true
